<section id="event-header" hx-swap-oob="true" class="px-4 pt-3 pb-2">
  <div class="flex items-center justify-between mb-2">
    <div class="flex items-baseline gap-2">
      <h2 class="text-[15px] font-semibold tracking-tight" style="color: var(--ink-hi);">
        {{ event.event_ticker }}
      </h2>
      <span class="text-[11px]" style="color: var(--ink-lo);">
        {{ event.strike_count }} strike{{ '' if event.strike_count == 1 else 's' }}
      </span>
      {% if event.quoting_count > 0 %}
        <span class="inline-flex items-center px-1.5 py-0.5 text-[10px] font-medium uppercase tracking-wider rounded-sm border"
              style="background: #0e2238; color: var(--info); border-color: #28486e;">
          {{ event.quoting_count }} quoting
        </span>
      {% endif %}
      {% if event.lip_total_dollars > 0 %}
        <span class="inline-flex items-center px-1.5 py-0.5 text-[10px] font-medium uppercase tracking-wider rounded-sm border"
              style="background: #2b2410; color: var(--lip); border-color: #5a4923;">
          ${{ "%.0f"|format(event.lip_total_dollars) }} LIP/period
        </span>
      {% endif %}
    </div>
  </div>
</section>
