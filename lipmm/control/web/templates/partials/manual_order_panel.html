<section id="manual-order-panel" class="panel" hx-swap-oob="true">
  <h2 class="mb-3 text-sm font-semibold uppercase tracking-wide text-slate-400">Manual order</h2>
  <form class="grid grid-cols-2 gap-3 text-sm" data-form="manual-order">
    <label class="col-span-2 flex flex-col text-xs text-slate-400">
      Ticker
      <input name="ticker" class="input" required placeholder="KXSOYBEANMON-…">
    </label>
    <label class="flex flex-col text-xs text-slate-400">
      Side
      <select name="side" class="input" required>
        <option>bid</option>
        <option>ask</option>
      </select>
    </label>
    <label class="flex flex-col text-xs text-slate-400">
      Count
      <input name="count" type="number" min="1" max="100000" class="input" required value="1">
    </label>
    <label class="flex flex-col text-xs text-slate-400">
      Limit (cents)
      <input name="limit_price_cents" type="number" min="1" max="99" class="input" required>
    </label>
    <label class="flex flex-col text-xs text-slate-400">
      Lock side after?
      <select name="lock_after" class="input">
        <option value="false">no</option>
        <option value="true">yes</option>
      </select>
    </label>
    <label class="col-span-2 flex flex-col text-xs text-slate-400">
      Reason
      <input name="reason" class="input">
    </label>
    <p class="col-span-2 text-xs text-slate-500" data-notional>notional: —</p>
    <button type="submit" class="btn btn-primary col-span-2">submit</button>
  </form>
</section>
