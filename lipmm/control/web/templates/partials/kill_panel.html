<div id="kill-panel" hx-swap-oob="true" class="flex items-center gap-2">
  {% if snapshot.kill_state == "off" %}
    <button class="btn btn-danger" data-action="kill">Kill</button>
  {% elif snapshot.kill_state == "killed" %}
    <button class="btn btn-warn" data-action="arm">Arm</button>
  {% else %}
    <button class="btn btn-primary" data-action="resume-after-kill">Resume</button>
  {% endif %}
</div>
