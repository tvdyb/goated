<span id="pnl-pill" hx-swap-oob="true" class="pill
    {% if runtime and runtime.total_realized_pnl_dollars >= 0 %}bg-emerald-700/40 text-emerald-200
    {% elif runtime %}bg-rose-700/40 text-rose-200
    {% else %}bg-slate-800 text-slate-500{% endif %}">
  {% if runtime %}
    PnL ${{ "%+.2f"|format(runtime.total_realized_pnl_dollars) }}
  {% else %}
    PnL —
  {% endif %}
</span>
