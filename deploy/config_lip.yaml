# deploy/config_lip.yaml — LIP-optimized mode
#
# Maximizes liquidity incentive score:
#   - Larger size (50 contracts per side)
#   - Posts at best bid/ask (1.0x multiplier)
#   - Only cancels when price changes (maximize time on book)
#
# Usage: python -m deploy.lip_mode --config deploy/config_lip.yaml

series:
  - ticker_prefix: KXSOYBEANMON
    cme_symbol: ZS

lip:
  contracts_per_side: 12
  size_jitter: 3                  # randomize size ±3 (range 9-15)
  max_half_spread_cents: 4
  min_half_spread_cents: 2
  max_distance_from_best: 1    # never post more than 1c from best (0.50x floor)
  theo_tolerance: 2             # allow bids up to theo+2c / asks down to theo-2c
  eligible_strikes:
    - 1136.99
    - 1146.99
    - 1156.99
    - 1166.99
    - 1176.99
    - 1186.99
    - 1196.99

synthetic:
  vol: 0.1629
  forward_override: 0        # disabled — yfinance auto-pulls now
  yf_ticker: ZSK26.CBT       # May soybeans (front month Kalshi settles against)
  settlement_time: "2026-04-30T17:00:00-04:00"  # April 30 5pm EDT

loop:
  cycle_seconds: 3     # LIP war: check all strikes every 3s, reposition immediately

wasde:
  sensitivity_cents_per_mbu: 1.5    # T-65 review: was 18.0, actual ~1.4
  max_shift_cents: 50               # T-65 review: was 100, reduced

api:
  kalshi_base: https://api.elections.kalshi.com
