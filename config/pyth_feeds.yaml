# Pyth Hermes feed metadata. Feed IDs from pyth.network/price-feeds.
#
# Deliverable 1 only wires WTI. Others populated as each commodity is enabled.
# hermes_endpoint is the Hermes websocket streaming endpoint; hermes_http is
# the SSE/REST fallback used for smoke tests and (never) the hot path.

hermes_endpoint: "wss://hermes.pyth.network/ws"
hermes_http: "https://hermes.pyth.network"

feeds:
  wti:
    feed_id: "0xe62df6c8b4a85fe1a67db44dc12de5db330f7ac66b72dc658afedf0f4a415b43"
    symbol: "Crude Oil/USD"
    description: "Pyth WTI crude oil spot aggregate"
    expected_publishers_floor: 5
    max_staleness_ms: 2000

  soy:
    # SON6 = July 2026 CBOT soybean futures (front month as of Apr 2026).
    # Pyth publishes per-contract feeds, not a generic "soybean" aggregate.
    # Update to next front month contract when SON6 expires (2026-07-14).
    # NOTE: Pyth soy feeds may be inactive (price=0). System falls back to
    # Kalshi-inferred forward when Pyth is unavailable.
    feed_id: "0x0d03b648a12b297160e2fdce53cd643d993f7ade4549f8e91ec6e593cc085c21"
    symbol: "Commodities.SON6/USD"
    description: "Pyth CBOT soybean Jul-2026 futures"
    expected_publishers_floor: 5
    max_staleness_ms: 30000
    # Pyth soy prices are in cents/bushel (e.g. 1177.5 = $11.775/bu)
    price_divisor: 100.0
